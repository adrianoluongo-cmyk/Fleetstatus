<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD DIFETTI AUTOPARCO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --bg-base: #030508;
            --bg-glow: #0a1118;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f0f4f8;
            --text-muted: rgba(255, 255, 255, 0.5);
            --accent: #00d0ff;
            --red-neon: #ff3d57;
            --green-neon: #00e676;
        }

        body.light-mode {
            --bg-base: #e2e8f0;
            --bg-glow: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.1);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #0066cc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at 50% 0%, var(--bg-glow) 0%, var(--bg-base) 100%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        /* --- HEADER --- */
        .header {
            height: 130px; 
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 2px solid var(--glass-border);
            backdrop-filter: blur(20px);
            flex-shrink: 0;
            z-index: 100;
        }

        .header h1 { 
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem; 
            letter-spacing: 2px;
            text-transform: uppercase;
            max-width: 400px;
        }

        .header-right { display: flex; align-items: center; gap: 40px; }

        /* --- QR CODE SECTION ENHANCED --- */
        .qr-cta-box {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(0, 208, 255, 0.05);
            padding: 15px 25px;
            border-radius: 15px;
            border: 2px solid var(--accent);
            box-shadow: 0 0 20px rgba(0, 208, 255, 0.15);
            animation: borderPulse 4s infinite;
        }

        @keyframes borderPulse {
            0%, 100% { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 208, 255, 0.1); }
            50% { border-color: #fff; box-shadow: 0 0 25px rgba(0, 208, 255, 0.3); }
        }

        .qr-instructions {
            text-align: right;
        }

        .qr-instructions span {
            display: block;
            font-size: 0.8rem;
            color: var(--text-main);
            font-weight: 400;
            margin-bottom: 4px;
        }

        .qr-instructions strong {
            display: block;
            font-size: 1rem;
            color: var(--accent);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #qrcode { 
            background: white; 
            padding: 8px; 
            border-radius: 8px;
            display: block;
        }

        /* --- CLOCK & LIVE --- */
        #clock { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 2.8rem; 
            font-weight: 700;
            color: var(--text-main);
        }

        .live-tag {
            color: var(--red-neon);
            border: 1px solid var(--red-neon);
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 900;
            text-transform: uppercase;
            animation: blink 2s infinite;
            display: inline-block;
            margin-bottom: 5px;
        }

        /* --- DASHBOARD GRID --- */
        #listaDifetti {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 Colonne fisse per il 48" */
            grid-auto-rows: min-content;
            gap: 25px;
            padding: 40px;
            overflow-y: auto;
            align-content: start;
        }

        .veicolo-group {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            height: fit-content;
        }

        .veicolo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--glass-border);
        }

        .veicolo-sigla {
            font-size: 2.2rem;
            font-weight: 900;
            font-family: 'Inter', sans-serif;
        }

        .badge-conteggio {
            background: var(--red-neon);
            color: white;
            padding: 5px 15px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 1.2rem;
        }

        .difetto-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 5px solid var(--accent);
        }

        .difetto-card:last-child { margin-bottom: 0; }

        .tipologia-badge {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 6px;
            display: block;
        }

        .descrizione { font-size: 1.1rem; line-height: 1.4; color: var(--text-main); }
        .data-segnalazione { font-size: 0.8rem; color: var(--text-muted); display: block; margin-top: 10px; text-align: right; font-family: 'JetBrains Mono'; }

        .tutto-ok {
            grid-column: 1 / -1;
            text-align: center;
            padding: 120px;
            font-size: 2.5rem;
            color: var(--green-neon);
            border: 3px dashed var(--green-neon);
            border-radius: 30px;
            text-transform: uppercase;
            font-weight: 900;
            background: rgba(0, 230, 118, 0.02);
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* Scrollbar */
        #listaDifetti::-webkit-scrollbar { width: 8px; }
        #listaDifetti::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Dashboard Difetti Autoparco</h1>
        
        <div class="header-right">
            <div class="qr-cta-box">
                <div class="qr-instructions">
                    <span>Usa l'App Autoparco CRI</span>
                    <strong>Scansiona per Dettagli e Foto</strong>
                </div>
                <div id="qrcode"></div>
            </div>

            <div style="text-align: right; min-width: 160px;">
                <span class="live-tag">Live Database</span>
                <div id="clock">00:00</div>
            </div>
        </div>
    </div>

    <div id="listaDifetti">
        <div style="text-align: center; width: 100%; font-size: 1.5rem; opacity: 0.5; grid-column: 1/-1;">Inizializzazione flotta in corso...</div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT8wQ0jGLsUvO8VqP8SnyuLlar0zApUn1maRLMEWMFL2EFrv2LFcxGkLJ6X3vf4ilsDWPRAzHjcub-l/pub?output=csv';
        const appUrl = 'https://crigallarate1864.github.io/app_autoparco/';

        // QR Code Generazione (100px per massima leggibilità su monitor grande)
        new QRCode(document.getElementById("qrcode"), { 
            text: appUrl, 
            width: 100, 
            height: 100,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        function updateClock() {
            const now = new Date();
            const hour = now.getHours();
            if (hour >= 8 && hour < 18) document.body.classList.add('light-mode');
            else document.body.classList.remove('light-mode');

            document.getElementById('clock').innerText = now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000); updateClock();

        function caricaDati() {
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    const dati = results.data;
                    const listaDiv = document.getElementById('listaDifetti');
                    listaDiv.innerHTML = '';

                    const difettiValidi = dati.filter(riga => {
                        const haSigla = riga['Sigla radio'] && riga['Sigla radio'].trim() !== '';
                        const eRisolto = Object.values(riga).some(val => typeof val === 'string' && val.trim().toLowerCase() === 'risolto');
                        return haSigla && !eRisolto;
                    });

                    if (difettiValidi.length === 0) {
                        listaDiv.innerHTML = '<div class="tutto-ok">✨ Flotta Operativa - Nessun Difetto</div>';
                        return;
                    }

                    const raggruppati = {};
                    difettiValidi.reverse().forEach(d => {
                        // FIX: Prendi solo i primi 7 caratteri
                        const siglaPulita = d['Sigla radio'].trim().substring(0, 7).toUpperCase();
                        if (!raggruppati[siglaPulita]) raggruppati[siglaPulita] = [];
                        raggruppati[siglaPulita].push(d);
                    });

                    Object.keys(raggruppati).sort().forEach(sigla => {
                        const mezzoDiv = document.createElement('div');
                        mezzoDiv.className = 'veicolo-group';
                        
                        let htmlDifetti = '';
                        raggruppati[sigla].forEach(difetto => {
                            let problemi = [];
                            if (difetto['Difetto motore e meccanica ⚙️']) problemi.push('⚙️ ' + difetto['Difetto motore e meccanica ⚙️']);
                            if (difetto['Elettrico e Dispositivi di Emergenza 🚑']) problemi.push('🚑 ' + difetto['Elettrico e Dispositivi di Emergenza 🚑']);
                            if (difetto['Carrozzeria e vetri']) problemi.push('🚙 ' + difetto['Carrozzeria e vetri']);
                            if (difetto['Vano Sanitario e Interni']) problemi.push('🩺 ' + difetto['Vano Sanitario e Interni']);
                            if (difetto['Descrizione difetto']) problemi.push('📝 ' + difetto['Descrizione difetto']);

                            htmlDifetti += `
                                <div class="difetto-card">
                                    <span class="tipologia-badge">${difetto['Tipologia Difetto'] || 'ANOMALIA'}</span>
                                    <div class="descrizione">${problemi.join('<br>') || 'Dettaglio mancante'}</div>
                                    <span class="data-segnalazione">Segnalato il ${difetto['Informazioni cronologiche'] || ''}</span>
                                </div>`;
                        });

                        mezzoDiv.innerHTML = `
                            <div class="veicolo-header">
                                <span class="veicolo-sigla">${sigla}</span>
                                <span class="badge-conteggio">${raggruppati[sigla].length}</span>
                            </div>
                            <div class="difetti-lista">${htmlDifetti}</div>`;
                        listaDiv.appendChild(mezzoDiv);
                    });
                }
            });
        }

        setInterval(caricaDati, 300000); 
        caricaDati();
    </script>
</body>
</html>
