<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD Danni Autoparco CRI Gallarate</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --cri-red: #d64545;
            --bg-dark: #0f172a;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 20px;
            color: #1e293b;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--cri-red);
            color: white;
            padding: 20px 40px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(214, 69, 69, 0.2);
        }

        h1 { margin: 0; font-size: 2.5rem; }
        .stats { font-size: 1.5rem; font-weight: bold; }

        /* GRIGLIA PRINCIPALE */
        #listaDifetti {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 25px;
        }

        .veicolo-group {
            background: var(--card-bg);
            border-radius: 20px;
            border-top: 8px solid var(--cri-red);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .veicolo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .veicolo-sigla {
            font-size: 2rem;
            font-weight: 900;
            color: #0f172a;
        }

        .badge-conteggio {
            background: #f8fafc;
            color: var(--cri-red);
            border: 2px solid var(--cri-red);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* CARD SINGOLO DIFETTO */
        .difetto-card {
            background: #f8fafc;
            border-left: 5px solid #cbd5e1;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
        }

        .tipologia-badge {
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: bold;
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .descrizione {
            font-size: 1.1rem;
            line-height: 1.4;
            color: #334155;
        }

        .data-segnalazione {
            display: block;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 8px;
            text-align: right;
        }

        /* MESSAGGIO TUTTO OK */
        .tutto-ok {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px;
            background: white;
            border-radius: 30px;
            font-size: 3rem;
            color: #10b981;
        }

        .loading {
            font-size: 2rem;
            text-align: center;
            width: 100%;
            margin-top: 100px;
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>🚛 Stato Danni Autoparco</h1>
            <div id="last-update" style="opacity: 0.8;">Caricamento...</div>
        </div>
        <div class="stats" id="stats-summary">Mezzi con danni: --</div>
    </header>

    <div id="listaDifetti">
        <div class="loading">Sincronizzazione database in corso... ⏳</div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT8wQ0jGLsUvO8VqP8SnyuLlar0zApUn1maRLMEWMFL2EFrv2LFcxGkLJ6X3vf4ilsDWPRAzHjcub-l/pub?output=csv';
        
        function caricaDati() {
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    processaDati(results.data);
                    document.getElementById('last-update').textContent = "Ultimo aggiornamento: " + new Date().toLocaleTimeString();
                }
            });
        }

        function processaDati(dati) {
            const listaDiv = document.getElementById('listaDifetti');
            listaDiv.innerHTML = '';

            const difettiAttivi = dati.filter(riga => {
                const haSigla = riga['Sigla radio'] && riga['Sigla radio'].trim() !== '';
                const eRisolto = Object.values(riga).some(val => typeof val === 'string' && val.trim().toLowerCase() === 'risolto');
                return haSigla && !eRisolto;
            });

            if (difettiAttivi.length === 0) {
                listaDiv.innerHTML = '<div class="tutto-ok">✅ Tutti i mezzi sono operativi</div>';
                document.getElementById('stats-summary').textContent = "Mezzi con danni: 0";
                return;
            }

            // Raggruppamento
            const raggruppati = {};
            difettiAttivi.forEach(d => {
                const sigla = d['Sigla radio'].trim().substring(0, 10);
                if (!raggruppati[sigla]) raggruppati[sigla] = [];
                raggruppati[sigla].push(d);
            });

            const sigle = Object.keys(raggruppati).sort();
            document.getElementById('stats-summary').textContent = `Mezzi con danni: ${sigle.length}`;

            sigle.forEach(sigla => {
                const mezzoDiv = document.createElement('div');
                mezzoDiv.className = 'veicolo-group';
                
                let htmlDifetti = '';
                raggruppati[sigla].forEach(difetto => {
                    const tipo = difetto['Tipologia Difetto'] || 'Generico';
                    
                    // Estraggo i testi dei vari campi come nel tuo codice originale
                    let dettagli = [];
                    if (difetto['Difetto motore e meccanica ⚙️']) dettagli.push(difetto['Difetto motore e meccanica ⚙️']);
                    if (difetto['Elettrico e Dispositivi di Emergenza 🚑']) dettagli.push(difetto['Elettrico e Dispositivi di Emergenza 🚑']);
                    if (difetto['Carrozzeria e vetri']) dettagli.push(difetto['Carrozzeria e vetri']);
                    if (difetto['Vano Sanitario e Interni']) dettagli.push(difetto['Vano Sanitario e Interni']);
                    
                    const descrizioneText = dettagli.join(' | ') || difetto['Descrizione difetto'] || 'Dettaglio non specificato';

                    htmlDifetti += `
                        <div class="difetto-card">
                            <span class="tipologia-badge" style="background:#fee2e2; color:#b91c1c">${tipo}</span>
                            <div class="descrizione">${descrizioneText}</div>
                            <span class="data-segnalazione">📅 ${difetto['Informazioni cronologiche'] || ''}</span>
                        </div>
                    `;
                });

                mezzoDiv.innerHTML = `
                    <div class="veicolo-header">
                        <span class="veicolo-sigla">🚐 ${sigla}</span>
                        <span class="badge-conteggio">${raggruppati[sigla].length}</span>
                    </div>
                    <div class="difetti-lista">
                        ${htmlDifetti}
                    </div>
                `;
                listaDiv.appendChild(mezzoDiv);
            });
        }

        // Avvio e Refresh automatico ogni 5 minuti (300000 ms)
        caricaDati();
        setInterval(caricaDati, 300000);
    </script>
</body>
</html>
